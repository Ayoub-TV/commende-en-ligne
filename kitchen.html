<!doctype html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Cuisine — Brimo Chicken</title><link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="order.css"><style>body{background:#f4f3f1;color:#20201f}.kitchen-shell{width:min(1440px,calc(100% - 48px));margin:auto}.kitchen-head{padding:34px 0 28px;border-bottom:1px solid #dedbd7}.kitchen-kicker{display:block;color:#e97622;font-size:.7rem;letter-spacing:.16em;font-weight:700;margin-bottom:7px}.kitchen-head h1{font-size:1.75rem;letter-spacing:.02em;margin:0}.kitchen-head p{margin:8px 0 0;color:#77736e;font-size:.86rem}.kitchen-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(380px,1fr));gap:24px;padding:30px 0 48px}.ticket{min-height:340px;background:#fff;border:1px solid #e5e1dc;border-radius:22px;padding:26px;box-shadow:0 12px 34px rgba(58,45,33,.08);display:flex;flex-direction:column;transition:transform .2s,box-shadow .2s}.ticket:hover{transform:translateY(-2px);box-shadow:0 18px 42px rgba(58,45,33,.12)}.ticket__head{display:flex;justify-content:space-between;align-items:flex-start;gap:18px;padding-bottom:18px;border-bottom:1px solid #eeeae5}.ticket__id{margin:0;font-size:1.08rem;letter-spacing:.06em;color:#272522}.ticket__table{margin:7px 0 0;color:#77736e;font-size:.86rem}.ticket__total{font-size:1.15rem;color:#8d3f09;white-space:nowrap}.customer{margin:20px 0 15px}.customer strong{display:block;font-size:.96rem;margin-bottom:6px}.customer span{color:#77736e;font-size:.83rem}.ticket ul{list-style:none;margin:0;padding:14px 0;border-top:1px solid #eeeae5;flex:1}.ticket li{display:flex;justify-content:space-between;gap:16px;padding:8px 0;font-size:.89rem;line-height:1.4}.ticket li b{color:#c45f15;margin-right:7px}.ticket li small{display:block;color:#89847e;margin:3px 0 0 23px}.ticket__time{padding-top:15px;border-top:1px solid #eeeae5;color:#77736e;font-size:.78rem;letter-spacing:.02em}.kitchen-empty{grid-column:1/-1;text-align:center;padding:58px 20px;color:#85807a;border:1px dashed #d5d0c9;border-radius:18px;background:rgba(255,255,255,.55)}@media(max-width:650px){.kitchen-shell{width:min(100% - 28px,1440px)}.kitchen-head{padding:22px 0}.kitchen-grid{grid-template-columns:1fr;gap:16px;padding-top:20px}.ticket{padding:20px}}</style></head><body class="order-page"><main class="kitchen-shell"><header class="kitchen-head"><span class="kitchen-kicker">BRIMO CHICKEN · KITCHEN DISPLAY</span><h1>Commandes en cours</h1><p>Les commandes reçues apparaîtront automatiquement.</p></header><section class="kitchen-grid" id="tickets" aria-live="polite"><div class="kitchen-empty" id="kitchen-empty">En attente de nouvelles commandes.</div></section></main><script>/* Point d'intégration Firebase : appelez BrimoKitchen.receiveOrder(commande) à chaque ajout Firestore. */(function(){const tickets=document.getElementById('tickets'),empty=document.getElementById('kitchen-empty');const money=n=>`${Number(n||0).toFixed(2).replace('.00','')} DH`;const text=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));function playNotification(){new Audio("notification.mp3").play();}function createCard(order){const client=order.client||{},products=order.products||[],date=order.date?new Date(order.date):null,displayDate=date&&!Number.isNaN(date)?date.toLocaleDateString('fr-MA'):order.date||'';const card=document.createElement('article');card.className='ticket';card.dataset.orderId=order.id||'';card.innerHTML=`<div class="ticket__head"><div><h2 class="ticket__id">${text(order.id)}</h2><p class="ticket__table">Table ${text(client.table)}</p></div><strong class="ticket__total">${money(order.total)}</strong></div><div class="customer"><strong>${text((client.prenom||'')+' '+(client.nom||''))}</strong><span>${text(client.telephone)}</span></div><ul>${products.map(p=>`<li><span><b>×${text(p.quantity)}</b>${text(p.name)}${p.note?`<small>Note : ${text(p.note)}</small>`:''}</span><span>${money(Number(p.price||0)*Number(p.quantity||0))}</span></li>`).join('')}</ul><div class="ticket__time">${text(displayDate)} · ${text(order.heure)}</div>`;return card}function receiveOrder(order){if(!order)return;empty?.remove();tickets.prepend(createCard(order));playNotification()}window.BrimoKitchen={receiveOrder,createCard,playNotification};})();</script><script type="module">
import { db } from "./firebase-config.js";
import {
  collection,
  onSnapshot,
  query,
  orderBy
} from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

const ordersRef = query(
  collection(db, "orders"),
  orderBy("date", "desc")
);

const displayed = new Set();

onSnapshot(ordersRef, (snapshot) => {

  snapshot.forEach((doc) => {

    const order = doc.data();

    if (displayed.has(doc.id))
      return;

    displayed.add(doc.id);

    BrimoKitchen.receiveOrder(order);

  });

});
</script> 
<script type="module" src="auth.js"></script>
</body>
</html>
