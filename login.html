<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion • Brimo Chicken</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Montserrat,sans-serif;
}

body{
background:#f6f6f6;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login-box{

background:white;
width:420px;
padding:35px;
border-radius:20px;
box-shadow:0 15px 40px rgba(0,0,0,.12);

}

.logo{

text-align:center;
margin-bottom:25px;

}

.logo img{

width:80px;
height:80px;
border-radius:50%;

}

.logo h1{

margin-top:10px;
font-size:28px;
color:#E97622;

}

label{

display:block;
margin-top:15px;
margin-bottom:8px;
font-weight:600;

}

input{

width:100%;
padding:14px;
border:1px solid #ddd;
border-radius:12px;
font-size:15px;

}

button{

width:100%;
margin-top:25px;
padding:15px;
border:none;
background:#E97622;
color:white;
font-size:16px;
font-weight:bold;
border-radius:12px;
cursor:pointer;

}

button:hover{

background:#d8640e;

}

#error{

margin-top:18px;
color:red;
text-align:center;

}

</style>

</head>

<body>

<div class="login-box">

<div class="logo">

<img src="logo brimochicken.jpg">

<h1>BRIMO CHICKEN</h1>

</div>

<form id="loginForm">

<label>Email</label>
<input
type="email"
id="email"
required>

<label>Mot de passe</label>
<input
type="password"
id="password"
required>

<button type="submit">
Se connecter
</button>

</form>

<div id="error"></div>

</div>

<script type="module" src="auth.js"></script>

</body>
</html>
