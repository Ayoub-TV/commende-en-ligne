<!doctype html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Commande — Brimo Chicken</title><link rel="manifest" href="manifest.json"><link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="order.css"></head><body class="order-page"><div class="order-shell"><header class="order-top"><a class="order-brand" href="index.html"><img src="logo brimochicken.jpg" alt="">BRIMO CHICKEN</a><a href="cart.html">← Panier</a></header><main class="checkout-layout"><section class="order-card"><h1>Finaliser la commande</h1><p class="muted">Vos coordonnées servent uniquement à préparer et livrer votre commande à table.</p><form id="checkout"><div class="form-grid"><div class="field"><label for="firstName">Prénom</label><input id="firstName" name="firstName" required autocomplete="given-name"></div><div class="field"><label for="lastName">Nom</label><input id="lastName" name="lastName" required autocomplete="family-name"></div><div class="field"><label for="phone">Numéro de téléphone</label><input id="phone" name="phone" type="tel" required autocomplete="tel"></div><div class="field"><label for="table">Numéro de table</label><input id="table" name="table" required inputmode="numeric"></div><div class="field field--wide"><label for="orderNote">Note de commande</label><textarea id="orderNote" name="orderNote" rows="3" placeholder="Allergies, instructions particulières…"></textarea></div></div><button class="button button--wide" type="submit">Passer la commande</button></form></section></main></div><script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
<script src="onesignal.js" defer></script>

<script type="module" src="order.js"></script>

<script>
document.getElementById("checkout").addEventListener("submit", async (e) => {
    e.preventDefault();

    try {
        if (!BrimoOrder.cart().length) {
            location.href = "cart.html";
            return;
        }

        const f = new FormData(e.currentTarget);

        const client = {
            prenom: f.get("firstName"),
            nom: f.get("lastName"),
            telephone: f.get("phone"),
            table: f.get("table")
        };

        BrimoOrder.saveCustomer(client);

        const commande = BrimoOrder.newOrder(client);

        await sendOrder(commande);

        BrimoOrder.setCart([]);

        document.querySelector("main").innerHTML = `
            <section class="order-card empty">
                <h1>Merci !</h1>
                <p>Votre commande <strong>${commande.id}</strong> a été transmise à la cuisine.</p>
                <p>Table ${client.table} · ${BrimoOrder.money(commande.total)}</p>
                <a class="button" href="index.html">Retour au menu</a>
            </section>
        `;

    } catch (err) {
        console.error(err);
        alert("Erreur : " + err.message);
    }
});

console.log("Le script checkout est chargé");
</script>
</body>
</html>
